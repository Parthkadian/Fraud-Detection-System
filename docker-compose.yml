version: "3.9"

services:
  api:
    build: .
    container_name: fraud_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    restart: unless-stopped

  dashboard:
    build: .
    container_name: fraud_dashboard
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      API_BASE_URL: http://api:8000
      OPEN_BROWSER: "1"
    depends_on:
      - api
    restart: unless-stopped

  redis:
    image: "redis:alpine"
    container_name: fraud_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  celery_worker:
    build: .
    container_name: fraud_celery_worker
    command: celery -A api.celery_worker.celery_app worker --loglevel=info
    volumes:
      - .:/app
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - redis
      - api
    restart: unless-stopped