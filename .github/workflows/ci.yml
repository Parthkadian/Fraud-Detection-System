name: CI Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-lint-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-lint-

    - name: Install linters
      run: pip install ruff mypy types-PyYAML types-requests

    - name: Run Ruff (lint)
      run: ruff check src/ api/ tests/ --ignore E501

    - name: Run Ruff (format check)
      run: ruff format --check src/ api/ tests/ || true

    - name: Run mypy (type check)
      run: |
        mypy src/ api/ --ignore-missing-imports --no-strict-optional || true

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    needs: lint
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests with coverage
      run: |
        pytest tests/ -v --tb=short \
          --cov=src --cov=api \
          --cov-report=term-missing \
          --cov-report=xml:coverage.xml

    - name: Upload coverage report
      if: matrix.python-version == '3.11'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t fraud-detection-system .

    - name: Verify image starts
      run: |
        docker run --rm -d --name test-container \
          -e MODEL_PATH="" \
          fraud-detection-system \
          python -c "import api; print('Import OK')" || true

