xgboost:
  n_estimators: 300
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.9
  colsample_bytree: 0.9
  objective: "binary:logistic"
  eval_metric: "logloss"
  random_state: 42
  n_jobs: -1

logistic_regression:
  C: 1.0
  max_iter: 1000
  class_weight: "balanced"
  solver: "liblinear"
  random_state: 42

random_forest:
  n_estimators: 200
  max_depth: 12
  class_weight: "balanced"
  random_state: 42
  n_jobs: -1