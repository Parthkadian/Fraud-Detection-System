xgboost:
  n_estimators: 150
  max_depth: 4
  learning_rate: 0.03
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 1.0
  reg_lambda: 5.0
  min_child_weight: 5
  gamma: 0.3
  objective: "binary:logistic"
  eval_metric: "logloss"
  random_state: 42
  n_jobs: -1

logistic_regression:
  C: 0.5
  max_iter: 1000
  class_weight: "balanced"
  solver: "liblinear"
  random_state: 42

random_forest:
  n_estimators: 200
  max_depth: 10
  min_samples_leaf: 5
  class_weight: "balanced"
  random_state: 42
  n_jobs: -1